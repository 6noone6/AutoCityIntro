name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke tests
        env:
          PYTHONPATH: .
        run: pytest -q tests/

      - name: Verify no secrets staged
        run: |
          if git ls-files | grep -x '.env'; then
            echo 'ERROR: .env should not be tracked'
            exit 1
          fi
