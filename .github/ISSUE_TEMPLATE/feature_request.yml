name: Feature Request
description: 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 你希望解决什么问题？当前有什么不便？
      placeholder: 作为用户，我希望在规划行程时能...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望的功能或交互是什么样的？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他实现方式？
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      options:
        - Agent / LangGraph
        - MCP 工具
        - 前端 UI
        - 地图 / 路线
        - 语音 / 图像
        - 行程管理
        - 文档 / 部署
        - 其他
    validations:
      required: true
