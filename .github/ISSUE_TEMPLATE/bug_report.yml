name: Bug Report
description: 报告一个问题或异常行为
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供可复现的信息，便于快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明发生了什么
      placeholder: 发送「附近有什么好吃的」后出现报错...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 列出操作步骤
      placeholder: |
        1. 启动 `python run_all.py`
        2. 打开 http://localhost:7003
        3. 发送消息「...」
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 如有报错信息请粘贴完整内容
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: macOS 15 / Windows 11 / Ubuntu 22.04
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python 版本
      placeholder: 3.11.x
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认 `.env` 未提交到仓库
          required: true
        - label: 我已搜索现有 Issue，确认没有重复
          required: false
